<!DOCTYPE html>
<html>
<head>
  <title>Stock News App</title>
</head>

<body>

<h1>📊 Stock News Finder 🚀</h1>

<input id="stock" placeholder="اكتب رمز السهم (مثل TSLA)" />
<button onclick="searchNews()">ابحث</button>

<div id="results"></div>

<script>
async function searchNews() {
  let stock = document.getElementById("stock").value;

  let url = "/api/news?ticker=" + encodeURIComponent(stock);

  let res = await fetch(url);
  let data = await res.json();
  let text = data.xml;

  document.getElementById("results").innerHTML =
    "<pre>" + text.substring(0, 1000) + "</pre>";
}
</script>

</body>
</html>
